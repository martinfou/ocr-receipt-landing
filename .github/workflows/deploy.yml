name: Deploy to Dreamhost

on:
  push:
    branches: [ master ]

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, xml, ctype, iconv, mysql, sqlite

      - name: Install Composer Dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction --no-progress

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install NPM Dependencies & Build Assets
        run: |
          npm ci
          npm run build

      - name: Prepare Deployment Package
        run: |
          rm -rf .git .github node_modules tests phpunit.xml
          rm -f database/database.sqlite

      - name: Deploy via SFTP (lftp)
        env:
          SFTP_PASSWORD: ${{ secrets.SFTP_PASSWORD }}
        run: |
          sudo apt-get update && sudo apt-get install -y lftp
          mkdir -p ~/.ssh
          echo "StrictHostKeyChecking no" >> ~/.ssh/config
          # Using username 'ocrreceipt' based on your previous message.
          # The path uses 'ocrrecript' as you indicated earlier.
          lftp -u "ocrreceipt,${SFTP_PASSWORD}" sftp://ocrreceipt.com -e "mirror -R . /home/ocrrecript/ocrreceipt.com/public; quit"
